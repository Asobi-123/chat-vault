<div id="chat_vault_settings" class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <strong data-i18n="drawer.title">聊天保险箱</strong>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content" style="display:none;">
        <div class="cvt-sidebar-status">
            <span id="cvt_sidebar_backend_status" class="cvt-badge" data-kind="idle">检查中</span>
            <span class="cvt-sidebar-note" data-i18n="drawer.note">主界面在悬浮面板里</span>
        </div>

        <div class="cvt-sidebar-row">
            <button id="cvt_open_panel_sidebar" type="button" class="menu_button menu_button_icon">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                <span data-i18n="drawer.openPanel">打开悬浮面板</span>
            </button>
        </div>

        <div class="cvt-sidebar-check">
            <label class="cvt-sidebar-check-label">
                <input id="cvt_show_trigger" type="checkbox" checked>
                <span data-i18n="drawer.showTrigger">显示悬浮球</span>
            </label>
            <div class="cvt-sidebar-check-desc" data-i18n="drawer.showTriggerDesc">关闭后会隐藏悬浮入口，仍可从这里重新打开面板。</div>
        </div>
    </div>
</div>
